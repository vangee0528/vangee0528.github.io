<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="vangee 的项目展示">
    <title>项目 | vangee</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/projects.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="nav scrolled" id="nav">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <span class="logo-text">vangee</span>
            </a>
            <div class="nav-links">
                <a href="../index.html">首页</a>
                <a href="articles.html">文章</a>
                <a href="projects.html" class="active">项目</a>
                <a href="about.html">关于</a>
            </div>
            <div class="nav-actions">
                <button class="theme-btn" id="themeBtn" aria-label="切换主题">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
            <button class="nav-menu-btn" id="menuBtn" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- 移动端菜单 -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-content">
            <a href="../index.html">首页</a>
            <a href="articles.html">文章</a>
            <a href="projects.html">项目</a>
            <a href="about.html">关于</a>
        </div>
    </div>

    <!-- 项目列表 -->
    <section class="page-content">
        <div class="page-hero">
            <div class="container">
                <h1 class="page-title">项目展示</h1>
                <p class="page-subtitle">用代码创造价值</p>
            </div>
        </div>
        <div class="container">
            <div class="projects-grid" id="projectsGrid">
                <!-- 项目卡片将通过 JavaScript 动态加载 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border: none;">
                <p>&copy; 2026 vangee. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        // 动态加载项目列表
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            if (!grid || !blogData || !blogData.projects) return;

            grid.innerHTML = blogData.projects.map(project => `
                <div class="project-card">
                    <div class="project-icon">${project.image}</div>
                    <h3>${project.title}</h3>
                    <p>${project.description}</p>
                    ${project.highlights ? `
                        <div class="project-highlights">
                            <h4>项目亮点</h4>
                            <ul>
                                ${project.highlights.map(h => `<li>${h}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                    <div class="project-tags">
                        ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div class="project-links">
                        ${project.detail ? `
                            <a href="${project.detail}" class="project-link primary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                                查看详情
                            </a>
                        ` : ''}
                        ${project.github ? `
                            <a href="${project.github}" class="project-link secondary" target="_blank" rel="noopener">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                                </svg>
                                GitHub
                            </a>
                        ` : ''}
                        ${project.demo ? `
                            <a href="${project.demo}" class="project-link secondary" target="_blank" rel="noopener">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="2" y1="12" x2="22" y2="12"></line>
                                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                                </svg>
                                在线演示
                            </a>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 页面加载完成后渲染项目列表
        document.addEventListener('DOMContentLoaded', renderProjects);
    </script>
</body>
</html>
